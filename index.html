<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🐍 Snake Battle</title>
  <style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:     #050a0e;
  --panel:  #0b1520;
  --border: #1a3a4a;
  --green:  #00ff88;
  --cyan:   #00ccff;
  --red:    #ff4466;
  --yellow: #ffcc00;
  --orange: #ff8800;
  --text:   #c8e8f0;
  --dim:    #4a7a8a;
}

html, body {
  height: 100%; background: var(--bg);
  color: var(--text); font-family: 'Courier New', Courier, monospace;
  overflow: hidden;
}
.screen { display: none; width: 100vw; height: 100vh; }
.screen.active { display: flex; }
.hidden { display: none !important; }

/* ── LOBBY ── */
#lobby { position: relative; align-items: center; justify-content: center; flex-direction: column; }
.lobby-bg {
  position: absolute; inset: 0;
  background:
    repeating-linear-gradient(0deg, transparent, transparent 39px, #0d2030 39px, #0d2030 40px),
    repeating-linear-gradient(90deg, transparent, transparent 39px, #0d2030 39px, #0d2030 40px);
  opacity: .35; animation: bgScroll 20s linear infinite;
}
@keyframes bgScroll { from{background-position:0 0} to{background-position:40px 40px} }
.lobby-content { position: relative; display: flex; flex-direction: column; align-items: center; gap: 28px; }
.logo-snake { display: block; font-size: 3.8rem; text-align: center; animation: bounce 1.8s ease-in-out infinite; }
@keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-12px)} }
.logo h1 {
  font-size: clamp(2.8rem,8vw,5rem); font-weight: 900; line-height: .9;
  color: var(--green); text-shadow: 0 0 12px #00ff8866, 0 0 30px #00ff8822;
  letter-spacing: .06em; text-align: center;
}
.logo h1 em { display: block; font-style: normal; color: var(--cyan); text-shadow: 0 0 12px #00ccff66; }
.tagline { margin-top: 6px; color: var(--dim); font-size: .82rem; letter-spacing: .14em; text-transform: uppercase; text-align: center; }

/* AI badge on lobby */
.ai-badge {
  display: flex; align-items: center; gap: 10px;
  background: #0a1e14; border: 1px solid #00ff8844;
  padding: 10px 18px; font-size: .82rem; letter-spacing: .08em;
}
.ai-badge .ai-icon { font-size: 1.3rem; animation: spin 3s linear infinite; }
@keyframes spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
.ai-badge span b { color: var(--green); }

.join-box { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
#name-input {
  background: var(--panel); border: 1px solid var(--border);
  color: var(--green); font-family: inherit; font-size: 1rem;
  padding: 12px 18px; width: 210px; outline: none; letter-spacing: .08em;
  transition: border-color .2s, box-shadow .2s;
}
#name-input:focus { border-color: var(--green); box-shadow: 0 0 12px #00ff8855; }
#name-input::placeholder { color: var(--dim); }
.btn-primary {
  background: transparent; border: 2px solid var(--green);
  color: var(--green); font-family: inherit; font-size: .95rem; font-weight: 700;
  padding: 12px 26px; cursor: pointer; letter-spacing: .12em;
  transition: background .15s, box-shadow .15s, color .15s; text-transform: uppercase;
}
.btn-primary:hover { background: var(--green); color: var(--bg); box-shadow: 0 0 16px #00ff8866; }
.btn-primary:active { transform: scale(.97); }
.controls-hint { font-size: .78rem; color: var(--dim); letter-spacing: .08em; }
.controls-hint span { color: var(--cyan); border: 1px solid #1a4060; padding: 2px 7px; }

/* ── GAME ── */
#game { flex-direction: column; align-items: center; }
#hud {
  width: 100%; display: flex; align-items: center;
  justify-content: space-between; padding: 7px 14px;
  background: var(--panel); border-bottom: 1px solid var(--border);
  flex-shrink: 0; gap: 10px; flex-wrap: wrap;
}
#room-label { font-size: .72rem; color: var(--dim); letter-spacing: .1em; }
.countdown-big {
  font-size: 2.2rem; color: var(--yellow);
  text-shadow: 0 0 20px #ffcc0099; font-weight: 900;
  animation: pulse .5s ease-in-out infinite alternate;
}
@keyframes pulse { from{opacity:1;transform:scale(1)} to{opacity:.5;transform:scale(.88)} }
#scoreboard { display: flex; gap: 10px; flex-wrap: wrap; justify-content: flex-end; }
.score-chip {
  display: flex; align-items: center; gap: 5px;
  font-size: .75rem; padding: 3px 8px;
  border: 1px solid var(--border); background: #0a1a28;
}
.score-chip.is-bot { border-color: #ff880044; }
.score-chip.is-bot .bot-tag {
  font-size: .6rem; color: var(--orange);
  border: 1px solid var(--orange); padding: 0 3px; letter-spacing: .05em;
}
.score-dot { width: 8px; height: 8px; border-radius: 50%; }
.score-chip.dead { opacity: .3; text-decoration: line-through; }

#canvas-wrap {
  position: relative; flex: 1;
  display: flex; align-items: center; justify-content: center; overflow: hidden;
}
#game-canvas { image-rendering: pixelated; border: 1px solid var(--border); box-shadow: 0 0 40px #00ccff0d; display: block; }
#dead-banner {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
  font-size: clamp(1.4rem,5vw,2.6rem); font-weight: 900;
  color: var(--red); text-shadow: 0 0 20px #ff446699;
  background: rgba(5,10,14,.88); padding: 14px 28px;
  border: 2px solid var(--red); pointer-events: none;
  animation: deadFlash 1s ease-in-out infinite alternate;
}
@keyframes deadFlash { from{opacity:1} to{opacity:.35} }

/* ── Toast notification ── */
#toast {
  position: fixed; top: 60px; left: 50%; transform: translateX(-50%);
  background: #0a1e30; border: 1px solid var(--orange);
  color: var(--orange); font-size: .85rem; letter-spacing: .1em;
  padding: 10px 22px; z-index: 100; pointer-events: none;
  opacity: 0; transition: opacity .3s;
  text-transform: uppercase;
}
#toast.show { opacity: 1; }

/* ── D-pad ── */
#dpad { display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 7px 0 10px; flex-shrink: 0; }
.dpad-row { display: flex; align-items: center; gap: 3px; }
.dpad-btn {
  width: 44px; height: 44px; background: var(--panel);
  border: 1px solid var(--border); color: var(--cyan);
  font-size: 1rem; cursor: pointer; touch-action: manipulation;
  -webkit-tap-highlight-color: transparent; transition: background .1s;
}
.dpad-btn:active { background: #0d2535; box-shadow: 0 0 10px #00ccff44; }
.dpad-center { width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; color: var(--dim); font-size: .7rem; }

/* ── GAME OVER ── */
#gameover { align-items: center; justify-content: center; }
.go-box {
  text-align: center; padding: 34px 42px;
  background: var(--panel); border: 2px solid var(--border);
  display: flex; flex-direction: column; align-items: center; gap: 16px;
  max-width: 420px; width: 90%;
}
#go-title { font-size: 2.2rem; font-weight: 900; color: var(--red); text-shadow: 0 0 20px #ff446699; }
#go-winner { font-size: .95rem; color: var(--yellow); letter-spacing: .1em; }
#go-scores { width: 100%; display: flex; flex-direction: column; gap: 6px; }
.go-score-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 5px 10px; border: 1px solid var(--border); font-size: .85rem;
}
.go-score-row.bot-row { border-color: #ff880033; opacity: .75; }
.go-score-row .sname { display: flex; align-items: center; gap: 7px; }
.go-score-row .sdot  { width: 8px; height: 8px; border-radius: 50%; }
.go-score-row .sval  { color: var(--green); }
.go-score-row .bot-label { font-size: .6rem; color: var(--orange); border: 1px solid var(--orange); padding: 0 3px; }

@media (min-width: 900px) { #dpad { display: none; } }
@media (max-height: 600px) { .dpad-btn,.dpad-center { width: 38px; height: 38px; } }
  </style>
</head>
<body>

<!-- TOAST -->
<div id="toast"></div>

<!-- LOBBY -->
<div id="lobby" class="screen active">
  <div class="lobby-bg"></div>
  <div class="lobby-content">
    <div class="logo">
      <span class="logo-snake">🐍</span>
      <h1>SNAKE<br><em>BATTLE</em></h1>
      <p class="tagline">Multiplayer arena — eat, grow, dominate</p>
    </div>
    <div class="ai-badge">
      <span class="ai-icon">🤖</span>
      <span>Solo mode: <b>5 AI Bots</b> join automatically</span>
    </div>
    <div class="join-box">
      <input id="name-input" type="text" placeholder="Enter your name…" maxlength="16" autocomplete="off" />
      <button id="join-btn" class="btn-primary">Join Game</button>
    </div>
    <div class="controls-hint">
      <span>↑ ↓ ← →</span> or <span>W A S D</span> to move
    </div>
  </div>
</div>

<!-- GAME -->
<div id="game" class="screen">
  <div id="hud">
    <div id="room-label">Room: —</div>
    <div id="countdown-display" class="countdown-big hidden"></div>
    <div id="scoreboard"></div>
  </div>
  <div id="canvas-wrap">
    <canvas id="game-canvas"></canvas>
    <div id="dead-banner" class="hidden">💀 YOU DIED</div>
  </div>
  <div id="dpad">
    <button class="dpad-btn" data-dir="0,-1">▲</button>
    <div class="dpad-row">
      <button class="dpad-btn" data-dir="-1,0">◀</button>
      <div class="dpad-center">●</div>
      <button class="dpad-btn" data-dir="1,0">▶</button>
    </div>
    <button class="dpad-btn" data-dir="0,1">▼</button>
  </div>
</div>

<!-- GAME OVER -->
<div id="gameover" class="screen">
  <div class="go-box">
    <h2 id="go-title">GAME OVER</h2>
    <p id="go-winner"></p>
    <div id="go-scores"></div>
    <button id="restart-btn" class="btn-primary">Play Again</button>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.5/socket.io.min.js"></script>
<script>
const socket = io();

const joinBtn      = document.getElementById('join-btn');
const nameInput    = document.getElementById('name-input');
const canvas       = document.getElementById('game-canvas');
const ctx          = canvas.getContext('2d');
const hudRoom      = document.getElementById('room-label');
const hudCountdown = document.getElementById('countdown-display');
const scoreboard   = document.getElementById('scoreboard');
const deadBanner   = document.getElementById('dead-banner');
const goTitle      = document.getElementById('go-title');
const goWinner     = document.getElementById('go-winner');
const goScores     = document.getElementById('go-scores');
const restartBtn   = document.getElementById('restart-btn');
const toast        = document.getElementById('toast');

let myId      = null;
let gridW     = 40;
let gridH     = 30;
let cellSize  = 16;
let lastState = null;
let particles = [];
let toastTimer = null;

// ── Toast ────────────────────────────────────────────────────────────────────
function showToast(msg, duration=3000) {
  toast.textContent = msg;
  toast.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toast.classList.remove('show'), duration);
}

// ── Screens ──────────────────────────────────────────────────────────────────
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => { s.classList.remove('active'); s.style.display='none'; });
  const el = document.getElementById(id);
  el.style.display = 'flex'; el.classList.add('active');
}

// ── Canvas resize ─────────────────────────────────────────────────────────────
function resizeCanvas() {
  const dpad  = document.getElementById('dpad');
  const hudH  = document.getElementById('hud').offsetHeight;
  const dpadH = window.innerWidth < 900 ? dpad.offsetHeight + 16 : 0;
  const availH = window.innerHeight - hudH - dpadH - 10;
  const availW = document.getElementById('canvas-wrap').offsetWidth - 6;
  cellSize = Math.max(8, Math.floor(Math.min(availW/gridW, availH/gridH)));
  canvas.width  = cellSize * gridW;
  canvas.height = cellSize * gridH;
  if (lastState) drawState(lastState);
}
window.addEventListener('resize', resizeCanvas);

// ── Join ──────────────────────────────────────────────────────────────────────
joinBtn.addEventListener('click', doJoin);
nameInput.addEventListener('keydown', e => { if (e.key==='Enter') doJoin(); });
function doJoin() {
  socket.emit('join', { name: nameInput.value.trim() || 'Snake' });
  showScreen('game');
  setTimeout(resizeCanvas, 60);
}

// ── Controls ──────────────────────────────────────────────────────────────────
const KEY_MAP = {
  ArrowUp:[0,-1],w:[0,-1],W:[0,-1],
  ArrowDown:[0,1],s:[0,1],S:[0,1],
  ArrowLeft:[-1,0],a:[-1,0],A:[-1,0],
  ArrowRight:[1,0],d:[1,0],D:[1,0],
};
document.addEventListener('keydown', e => {
  const d = KEY_MAP[e.key]; if (d) { e.preventDefault(); socket.emit('dir',{dir:d}); }
});
document.querySelectorAll('.dpad-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    socket.emit('dir', { dir: btn.dataset.dir.split(',').map(Number) });
  });
});

restartBtn.addEventListener('click', () => {
  socket.emit('restart', {});
  showScreen('game');
  deadBanner.classList.add('hidden');
  particles = [];
  setTimeout(resizeCanvas, 60);
});

// ── Socket events ─────────────────────────────────────────────────────────────
socket.on('joined', data => {
  myId = data.player_id;
  gridW = data.grid[0]; gridH = data.grid[1];
  hudRoom.textContent = 'Room: #' + data.room_id.replace('room_','');
  lastState = data.state;
  resizeCanvas();
  requestAnimationFrame(render);
  showToast('🤖 Waiting… 5 AI bots joining in 2s', 2500);
});

socket.on('bots_added', data => {
  showToast(`🤖 ${data.count} AI Bots entered the arena!`, 3000);
});

socket.on('countdown', data => {
  hudCountdown.textContent = data.count;
  hudCountdown.classList.remove('hidden');
});
socket.on('game_start', () => {
  hudCountdown.classList.add('hidden');
  deadBanner.classList.add('hidden');
});

socket.on('state', data => {
  lastState = data;
  if (data.players[myId] && !data.players[myId].alive)
    deadBanner.classList.remove('hidden');
  updateScoreboard(data.players);
});

socket.on('game_over', data => {
  goTitle.textContent = data.winner === 'Nobody' ? '💀 DRAW' : '🏆 WINNER!';
  goWinner.textContent = data.winner !== 'Nobody' ? data.winner + ' wins!' : 'Everyone died!';
  goScores.innerHTML = '';
  const isBot = name => lastState && Object.values(lastState.players).find(p=>p.name===name)?.is_bot;
  Object.entries(data.scores).sort((a,b)=>b[1]-a[1]).forEach(([name, score]) => {
    let color = '#aaa';
    if (lastState) { const p = Object.values(lastState.players).find(p=>p.name===name); if(p) color=p.color; }
    const bot = isBot(name);
    const row = document.createElement('div');
    row.className = 'go-score-row' + (bot?' bot-row':'');
    row.innerHTML = `<span class="sname"><span class="sdot" style="background:${color}"></span>${name}${bot?'<span class="bot-label">BOT</span>':''}</span><span class="sval">${score} pts</span>`;
    goScores.appendChild(row);
  });
  setTimeout(() => showScreen('gameover'), 700);
});

// ── Scoreboard ─────────────────────────────────────────────────────────────
function updateScoreboard(players) {
  scoreboard.innerHTML = '';
  Object.values(players).sort((a,b)=>b.score-a.score).forEach(p => {
    const chip = document.createElement('div');
    chip.className = 'score-chip' + (p.alive?'':' dead') + (p.is_bot?' is-bot':'');
    chip.innerHTML = `<span class="score-dot" style="background:${p.color}"></span>`
      + `<span>${p.name}</span>`
      + (p.is_bot ? '<span class="bot-tag">BOT</span>' : '')
      + `<span style="color:${p.color};margin-left:3px">${p.score}</span>`;
    scoreboard.appendChild(chip);
  });
}

// ── Render ────────────────────────────────────────────────────────────────────
function render() {
  requestAnimationFrame(render);
  if (lastState) drawState(lastState);
  drawParticles();
}

function drawState(state) {
  const C=cellSize, W=canvas.width, H=canvas.height;
  ctx.fillStyle='#050a0e'; ctx.fillRect(0,0,W,H);

  // Grid
  ctx.strokeStyle='#0d2030'; ctx.lineWidth=.5;
  for(let x=0;x<=gridW;x++){ctx.beginPath();ctx.moveTo(x*C,0);ctx.lineTo(x*C,H);ctx.stroke();}
  for(let y=0;y<=gridH;y++){ctx.beginPath();ctx.moveTo(0,y*C);ctx.lineTo(W,y*C);ctx.stroke();}

  // Food
  state.food.forEach(([fx,fy]) => {
    const cx=fx*C+C/2, cy=fy*C+C/2;
    const r=C*.36+Math.sin(Date.now()*.005+fx)*C*.05;
    const g=ctx.createRadialGradient(cx,cy,0,cx,cy,r*2.2);
    g.addColorStop(0,'#ffcc0088'); g.addColorStop(1,'transparent');
    ctx.fillStyle=g; ctx.fillRect(cx-r*2.2,cy-r*2.2,r*4.4,r*4.4);
    ctx.fillStyle='#ffcc00'; ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#fff8'; ctx.beginPath(); ctx.arc(cx-r*.25,cy-r*.28,r*.28,0,Math.PI*2); ctx.fill();
  });

  // Snakes
  Object.values(state.players).forEach(p => {
    if (!p.body||!p.body.length) return;
    ctx.globalAlpha = p.alive ? 1 : .25;

    p.body.forEach(([bx,by],i) => {
      const pad=i===0?1:2, x=bx*C+pad, y=by*C+pad, s=C-pad*2;
      if (i===0) {
        // Head glow — orange tint for bots
        const glowColor = p.is_bot ? '#ff8800' : p.color;
        ctx.shadowColor = glowColor; ctx.shadowBlur = p.is_bot ? 10 : 14;
        ctx.fillStyle = p.color; ctx.fillRect(x,y,s,s); ctx.shadowBlur=0;

        // Bot head: draw gear/circuit mark
        if (p.is_bot) {
          ctx.fillStyle = 'rgba(0,0,0,0.5)';
          ctx.fillRect(x+s*.2, y+s*.2, s*.6, s*.6);
          ctx.strokeStyle = '#ff880099'; ctx.lineWidth = 1;
          ctx.strokeRect(x+s*.2, y+s*.2, s*.6, s*.6);
        }

        // Eyes
        const er=Math.max(1.5,C*.11);
        ctx.fillStyle='#050a0e';
        ctx.beginPath();ctx.arc(x+s*.3,y+s*.35,er,0,Math.PI*2);ctx.fill();
        ctx.beginPath();ctx.arc(x+s*.7,y+s*.35,er,0,Math.PI*2);ctx.fill();
        // Pupils — red for bots
        ctx.fillStyle = p.is_bot ? '#ff4444' : '#fff';
        ctx.beginPath();ctx.arc(x+s*.3+er*.3,y+s*.35-er*.2,er*.38,0,Math.PI*2);ctx.fill();
        ctx.beginPath();ctx.arc(x+s*.7+er*.3,y+s*.35-er*.2,er*.38,0,Math.PI*2);ctx.fill();
      } else {
        const t=i/p.body.length;
        ctx.fillStyle=hexAlpha(p.color, 1-t*.55);
        ctx.fillRect(x,y,s,s);
      }
    });
    ctx.globalAlpha=1;
  });
}

// ── Particles ──────────────────────────────────────────────────────────────
function drawParticles() {
  particles=particles.filter(p=>p.life>0);
  particles.forEach(p=>{
    p.x+=p.vx; p.y+=p.vy; p.life-=.03;
    ctx.globalAlpha=p.life; ctx.fillStyle=p.color;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill();
  });
  ctx.globalAlpha=1;
}

function hexAlpha(hex,a) {
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}

showScreen('lobby');
nameInput.focus();
</script>
</body>
</html>
